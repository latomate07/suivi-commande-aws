AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Application serverless de suivi de commande - Stack racine.

Parameters:
  ProjectName:
    Type: String
    Default: suivi-commande
  EnvironmentName:
    Type: String
    Default: dev

Resources:

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/database.yml
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName

  AuthStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/auth.yml
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName

  PublicApiStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: DatabaseStack
    Properties:
      TemplateURL: infra/public-api.yml
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        OrdersTableName: !GetAtt DatabaseStack.Outputs.OrdersTableName
        OrdersTableArn: !GetAtt DatabaseStack.Outputs.OrdersTableArn

  AdminApiStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - DatabaseStack
      - AuthStack
    Properties:
      TemplateURL: infra/admin-api.yml
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName
        OrdersTableName: !GetAtt DatabaseStack.Outputs.OrdersTableName
        OrdersTableArn: !GetAtt DatabaseStack.Outputs.OrdersTableArn
        AdminUserPoolArn: !GetAtt AuthStack.Outputs.AdminUserPoolArn

  StaticSitesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/static-sites.yml
      Parameters:
        ProjectName: !Ref ProjectName
        EnvironmentName: !Ref EnvironmentName

Outputs:
  ProjectName:
    Value: !Ref ProjectName
  EnvironmentName:
    Value: !Ref EnvironmentName

  # API publique
  PublicApiUrl:
    Description: URL de base de l'API publique
    Value: !GetAtt PublicApiStack.Outputs.PublicApiUrl
  CreateOrderUrl:
    Description: POST /create/{orderId}
    Value: !GetAtt PublicApiStack.Outputs.CreateOrderUrl
  TrackOrderUrl:
    Description: GET /track/{orderId}
    Value: !GetAtt PublicApiStack.Outputs.TrackOrderUrl

  # API admin (Cognito)
  AdminApiUrl:
    Description: URL de base de l'API admin (Authorization header requis)
    Value: !GetAtt AdminApiStack.Outputs.AdminApiUrl
  AdminUserPoolId:
    Description: ID du User Pool Cognito
    Value: !GetAtt AuthStack.Outputs.AdminUserPoolId
  AdminUserPoolClientId:
    Description: ID du client Cognito (pour l'auth depuis le front)
    Value: !GetAtt AuthStack.Outputs.AdminUserPoolClientId

  # web_suivi
  WebSuiviUrl:
    Description: URL CloudFront de web_suivi
    Value: !GetAtt StaticSitesStack.Outputs.WebSuiviUrl
  WebSuiviBucketName:
    Description: Bucket S3 de web_suivi (pour s3 sync)
    Value: !GetAtt StaticSitesStack.Outputs.WebSuiviBucketName
  WebSuiviDistributionId:
    Description: ID de la distribution CloudFront de web_suivi (pour invalidation)
    Value: !GetAtt StaticSitesStack.Outputs.WebSuiviDistributionId

  # web_stock
  WebStockUrl:
    Description: URL CloudFront de web_stock
    Value: !GetAtt StaticSitesStack.Outputs.WebStockUrl
  WebStockBucketName:
    Description: Bucket S3 de web_stock (pour s3 sync)
    Value: !GetAtt StaticSitesStack.Outputs.WebStockBucketName
  WebStockDistributionId:
    Description: ID de la distribution CloudFront de web_stock (pour invalidation)
    Value: !GetAtt StaticSitesStack.Outputs.WebStockDistributionId
